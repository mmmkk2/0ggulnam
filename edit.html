<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📝</text></svg>">
    <title>HTML 편집</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            margin: 0;
            background: #fff;
            color: #333;
        }
        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 16px;
            border-bottom: 1px solid #eee;
            flex-shrink: 0;
            gap: 10px;
        }
        .title {
            font-size: 0.9rem;
            color: #333;
            font-weight: 500;
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .btn {
            font-size: 0.82rem;
            padding: 6px 14px;
            border-radius: 6px;
            cursor: pointer;
            border: 1px solid #ddd;
            background: #fff;
            color: #333;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .btn:hover { background: #f5f5f5; }
        .btn.primary { background: #000; color: #fff; border-color: #000; }
        .btn.primary:hover { background: #333; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        textarea {
            flex: 1;
            border: none;
            outline: none;
            padding: 16px;
            font-family: 'Menlo', 'Monaco', 'Courier New', monospace;
            font-size: 0.82rem;
            line-height: 1.6;
            resize: none;
            color: #1a1a1a;
            background: #fafafa;
        }
        .msg {
            padding: 6px 16px;
            font-size: 0.78rem;
            min-height: 28px;
            flex-shrink: 0;
            border-top: 1px solid #eee;
        }
        .err { color: #e00; }
        .ok { color: #090; }
    </style>
</head>
<body>
    <div class="topbar">
        <span class="title" id="page-title">불러오는 중...</span>
        <a href="/" class="btn">← 목록</a>
        <button id="save-btn" class="btn primary" onclick="save()" disabled>저장</button>
    </div>
    <textarea id="editor" spellcheck="false" placeholder="불러오는 중..."></textarea>
    <div class="msg" id="msg"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const client = supabase.createClient(
            'https://jsxzyhzltlurfbyvaoow.supabase.co',
            'sb_publishable_hUXcNvjScqIRigCfGwpfUQ_2rcLJMHy'
        )

        const params = new URLSearchParams(location.search)
        const id = params.get('id')
        let currentFilename = ''

        async function init() {
            const { data: { session } } = await client.auth.getSession()
            if (!session) {
                location.href = `/login.html?redirect=/edit.html?id=${id}`
                return
            }

            if (!id) {
                document.getElementById('msg').className = 'msg err'
                document.getElementById('msg').textContent = 'ID가 없습니다.'
                return
            }

            const { data: post, error } = await client.from('posts').select('title, filename, url').eq('id', id).single()
            if (error || !post) {
                document.getElementById('msg').className = 'msg err'
                document.getElementById('msg').textContent = '게시물을 찾을 수 없습니다.'
                return
            }

            document.getElementById('page-title').textContent = post.title || '제목 없음'
            document.title = `편집 - ${post.title || ''}`
            currentFilename = post.filename

            const res = await fetch(post.url)
            if (!res.ok) {
                document.getElementById('msg').className = 'msg err'
                document.getElementById('msg').textContent = '파일을 불러올 수 없습니다.'
                return
            }

            document.getElementById('editor').value = await res.text()
            document.getElementById('save-btn').disabled = false
            document.getElementById('msg').textContent = ''
        }

        async function save() {
            const btn = document.getElementById('save-btn')
            const msg = document.getElementById('msg')
            const content = document.getElementById('editor').value

            btn.disabled = true
            msg.className = 'msg'
            msg.textContent = '저장 중...'

            const file = new Blob([content], { type: 'text/html' })
            const { error } = await client.storage
                .from('html-files')
                .upload(currentFilename, file, { contentType: 'text/html', upsert: true })

            if (error) {
                msg.className = 'msg err'
                msg.textContent = '저장 실패: ' + error.message
            } else {
                msg.className = 'msg ok'
                msg.textContent = '✓ 저장 완료'
            }
            btn.disabled = false
        }

        init()
    </script>
</body>
</html>
