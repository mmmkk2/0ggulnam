<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏢</text></svg>">
    <title>로그인 | Oggulnam</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #ffffff;
            color: #333;
            padding: 1rem;
        }
        .container {
            width: 100%;
            max-width: 420px;
            padding: 2rem;
            border: 1px solid #eee;
            border-radius: 16px;
            box-shadow: 0 12px 40px rgba(0,0,0,.06);
        }
        h1 {
            margin: 0 0 1.5rem;
            font-size: 1.4rem;
            letter-spacing: -0.5px;
        }
        label {
            display: block;
            margin-bottom: 6px;
            color: #666;
            font-size: 0.85rem;
        }
        input {
            width: 100%;
            padding: 12px 14px;
            margin-bottom: 16px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 0.95rem;
            outline: none;
        }
        input:focus { border-color: #000; }
        button {
            width: 100%;
            padding: 12px;
            background: #000;
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 0.95rem;
            cursor: pointer;
        }
        button:disabled { background: #aaa; cursor: not-allowed; }
        .msg {
            margin-top: 12px;
            min-height: 20px;
            font-size: 0.9rem;
            text-align: center;
        }
        .err { color: #e00; }
        .ok { color: #090; }
        .helper {
            margin-top: 18px;
            font-size: 0.85rem;
            color: #555;
            text-align: center;
        }
        .helper a {
            color: #111;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>로그인</h1>
        <label for="email">이메일</label>
        <input id="email" type="email" placeholder="you@example.com" autocomplete="email" />
        <label for="password">비밀번호</label>
        <input id="password" type="password" placeholder="비밀번호" autocomplete="current-password" />
        <button id="btn" onclick="login()">로그인</button>
        <div class="msg" id="msg"></div>
        <div class="helper">
            <div>로그인 후 업로드할 수 있습니다.</div>
            <div><a href="/">← 목록으로 돌아가기</a></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const client = supabase.createClient(
            'https://jsxzyhzltlurfbyvaoow.supabase.co',
            'sb_publishable_hUXcNvjScqIRigCfGwpfUQ_2rcLJMHy'
        )

        function getRedirect() {
            const params = new URLSearchParams(window.location.search)
            return params.get('redirect') || '/'
        }

        async function login() {
            const email = document.getElementById('email').value.trim()
            const password = document.getElementById('password').value.trim()
            const msg = document.getElementById('msg')
            const btn = document.getElementById('btn')

            if (!email || !password) {
                msg.className = 'msg err'
                msg.textContent = '이메일과 비밀번호를 모두 입력해주세요.'
                return
            }

            btn.disabled = true
            msg.className = 'msg'
            msg.textContent = '로그인 중입니다...'

            const { error } = await client.auth.signInWithPassword({ email, password })
            if (error) {
                msg.className = 'msg err'
                msg.textContent = '로그인 실패: ' + error.message
                btn.disabled = false
                return
            }

            msg.className = 'msg ok'
            msg.textContent = '로그인 성공! 이동 중입니다...'
            window.location.href = getRedirect()
        }

        async function init() {
            const { data: { session } } = await client.auth.getSession()
            if (session) {
                window.location.href = getRedirect()
            }
        }

        init()
    </script>
</body>
</html>
