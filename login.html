<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏢</text></svg>">
    <title>로그인</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #ffffff;
            color: #333;
        }
        .container {
            width: 100%;
            max-width: 340px;
            padding: 2rem;
        }
        h1 {
            font-size: 1.3rem;
            font-weight: 600;
            margin: 0 0 1.5rem;
            text-align: center;
        }
        input {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 0.9rem;
            margin-bottom: 10px;
            outline: none;
            transition: border-color 0.2s;
        }
        input:focus { border-color: #000; }
        button {
            width: 100%;
            padding: 11px;
            background: #000;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 0.9rem;
            cursor: pointer;
            margin-top: 4px;
            transition: background 0.2s;
        }
        button:hover { background: #333; }
        button:disabled { background: #aaa; cursor: not-allowed; }
        .msg {
            font-size: 0.8rem;
            color: #e00;
            text-align: center;
            margin-top: 10px;
            min-height: 18px;
        }
        .back {
            display: block;
            text-align: center;
            margin-top: 16px;
            font-size: 0.8rem;
            color: #aaa;
            text-decoration: none;
        }
        .back:hover { color: #000; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏢 로그인</h1>
        <input type="email" id="email" placeholder="이메일" />
        <input type="password" id="password" placeholder="비밀번호" />
        <button id="btn" onclick="login()">로그인</button>
        <div class="msg" id="msg"></div>
        <a href="/" class="back">← 목록으로</a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const client = supabase.createClient(
            'https://jsxzyhzltlurfbyvaoow.supabase.co',
            'sb_publishable_hUXcNvjScqIRigCfGwpfUQ_2rcLJMHy'
        )

        client.auth.getSession().then(({ data }) => {
            if (data.session) location.href = '/upload'
        })

        async function login() {
            const email = document.getElementById('email').value
            const password = document.getElementById('password').value
            const btn = document.getElementById('btn')
            const msg = document.getElementById('msg')

            btn.disabled = true
            msg.textContent = ''

            const { error } = await client.auth.signInWithPassword({ email, password })
            if (error) {
                msg.textContent = '이메일 또는 비밀번호가 올바르지 않습니다.'
                btn.disabled = false
            } else {
                location.href = '/upload'
            }
        }

        document.addEventListener('keydown', e => { if (e.key === 'Enter') login() })
    </script>
</body>
</html>
