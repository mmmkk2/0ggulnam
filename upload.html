<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏢</text></svg>">
    <title>업로드</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #ffffff;
            color: #333;
        }
        .container {
            width: 100%;
            max-width: 400px;
            padding: 2rem;
        }
        h1 {
            font-size: 1.3rem;
            font-weight: 600;
            margin: 0 0 1.2rem;
            text-align: center;
        }
        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 1.5rem;
        }
        .tab-btn {
            flex: 1;
            padding: 8px;
            background: #f5f5f5;
            color: #888;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
            width: auto;
        }
        .tab-btn.active { background: #000; color: #fff; border-color: #000; }
        .tab-btn:hover:not(.active) { background: #eee; color: #333; }
        .field { margin-bottom: 20px; }
        label {
            font-size: 0.78rem;
            color: #888;
            display: block;
            margin-bottom: 6px;
        }
        input[type="text"],
        input[type="date"] {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 0.9rem;
            outline: none;
            transition: border-color 0.2s;
            color: #333;
            background: #fff;
        }
        input[type="text"]:focus,
        input[type="date"]:focus { border-color: #000; }
        input[type="date"] { cursor: pointer; }
        input[type="file"] { display: none; }
        .file-area {
            border: 1.5px dashed #ddd;
            border-radius: 6px;
            padding: 28px;
            text-align: center;
            cursor: pointer;
            font-size: 0.85rem;
            color: #aaa;
            transition: all 0.2s;
        }
        .file-area:hover { border-color: #999; color: #666; }
        .file-area.dragover { border-color: #000; background: #fafafa; }
        .file-area.selected { border-color: #000; color: #333; border-style: solid; }
        button {
            width: 100%;
            padding: 11px;
            background: #000;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover { background: #333; }
        button:disabled { background: #aaa; cursor: not-allowed; }
        .msg {
            font-size: 0.8rem;
            text-align: center;
            margin-top: 10px;
            min-height: 18px;
        }
        .err { color: #e00; }
        .ok { color: #090; }
        .back {
            display: block;
            text-align: center;
            margin-top: 16px;
            font-size: 0.8rem;
            color: #aaa;
            text-decoration: none;
        }
        .back:hover { color: #000; }
        .help-text {
            font-size: 0.82rem;
            color: #aaa;
            margin: 6px 0 0;
            line-height: 1.4;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📤 파일 업로드</h1>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('html')">HTML</button>
            <button class="tab-btn" onclick="switchTab('pdf')">PDF</button>
        </div>

        <!-- HTML 업로드 -->
        <div id="htmlSection">
            <div class="field">
                <label>HTML 파일</label>
                <div class="file-area" id="fileArea" onclick="document.getElementById('file').click()">
                    클릭하거나 파일을 끌어다 놓아 선택 (.html)
                </div>
                <input type="file" id="file" accept=".html" onchange="onFileChange()" />
                <p class="help-text">업로드 시 제목은 자동으로 완성됩니다.</p>
            </div>
            <div class="field">
                <label>제목</label>
                <input type="text" id="title" placeholder="특강 제목을 입력하세요" />
            </div>
            <div class="field">
                <label>강의 날짜</label>
                <input type="date" id="lecture_date" />
            </div>
            <button id="btn" onclick="upload()">업로드</button>
        </div>

        <!-- PDF 업로드 -->
        <div id="pdfSection" style="display:none">
            <div class="field">
                <label>PDF 파일 또는 폴더</label>
                <div class="file-area" id="pdfFileArea" onclick="document.getElementById('pdfFile').click()">
                    클릭하거나 폴더·파일을 끌어다 놓으세요<br>
                    <span style="font-size:0.75rem;color:#bbb">폴더째 드래그 → 하위 PDF 전부 한번에 업로드</span>
                </div>
                <input type="file" id="pdfFile" accept=".pdf" multiple onchange="onPdfFilesChange()" />
                <p class="help-text">폴더명/파일명 구조 그대로 저장됩니다.</p>
            </div>
            <div id="pdfList" style="display:none; margin-bottom:16px; font-size:0.8rem; max-height:160px; overflow-y:auto; border:1px solid #eee; border-radius:6px; padding:10px; line-height:1.8;"></div>
            <button id="pdfBtn" onclick="uploadPdfs()">PDF 업로드</button>
        </div>

        <button id="logout-btn" type="button" onclick="logout()" style="margin-top:10px; background:#fff; color:#000; border:1px solid #ddd;">로그아웃</button>
        <div class="msg" id="msg"></div>
        <a href="/" class="back">← 목록으로</a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const client = supabase.createClient(
            'https://jsxzyhzltlurfbyvaoow.supabase.co',
            'sb_publishable_hUXcNvjScqIRigCfGwpfUQ_2rcLJMHy'
        )
        const bucketName = 'html-files'
        const pdfBucketName = 'pdfs'

        client.auth.onAuthStateChange((event, session) => {
            if (event === 'INITIAL_SESSION' && !session) location.href = '/login.html?redirect=/upload.html'
        })

        document.getElementById('lecture_date').value = new Date().toISOString().slice(0, 10)

        setupDragDrop()
        setupPdfDragDrop()

        function switchTab(tab) {
            const isHtml = tab === 'html'
            document.getElementById('htmlSection').style.display = isHtml ? '' : 'none'
            document.getElementById('pdfSection').style.display = isHtml ? 'none' : ''
            document.querySelectorAll('.tab-btn').forEach((btn, i) => {
                btn.classList.toggle('active', (i === 0) === isHtml)
            })
            document.getElementById('msg').textContent = ''
        }

        function onFileChange() {
            handleFile(document.getElementById('file').files[0])
        }

        function setupDragDrop() {
            const fileInput = document.getElementById('file')
            const area = document.getElementById('fileArea')

            area.addEventListener('dragover', event => {
                event.preventDefault()
                area.classList.add('dragover')
            })

            area.addEventListener('dragleave', () => {
                area.classList.remove('dragover')
            })

            area.addEventListener('drop', event => {
                event.preventDefault()
                area.classList.remove('dragover')
                const file = event.dataTransfer.files[0]
                if (file) {
                    const dataTransfer = new DataTransfer()
                    dataTransfer.items.add(file)
                    fileInput.files = dataTransfer.files
                    handleFile(file)
                }
            })
        }

        function handleFile(file) {
            const area = document.getElementById('fileArea')
            if (!file) return

            area.textContent = '📄 ' + file.name
            area.classList.add('selected')

            const titleInput = document.getElementById('title')
            if (!titleInput.value.trim()) {
                const reader = new FileReader()
                reader.onload = () => {
                    const text = reader.result
                    const match = text.match(/<title[^>]*>([\s\S]*?)<\/title>/i)
                    if (match && match[1]) {
                        titleInput.value = match[1].trim().replace(/^영끌남\s*/,'')
                    }
                }
                reader.readAsText(file)
            }
        }

        function sanitizeFileName(name) {
            // Supabase Storage key에는 공백, 한글, 특수문자가 들어가면 실패할 수 있습니다.
            const extMatch = name.match(/(\.[^.]*)$/)
            const ext = extMatch ? extMatch[1] : ''
            const base = extMatch ? name.slice(0, -ext.length) : name
            return base
                .replace(/\s+/g, '_')
                .replace(/[^a-zA-Z0-9-_\.]/g, '_')
                .replace(/_+/g, '_')
                .replace(/^_+|_+$/g, '') + ext
        }

        let pdfFiles = []

        function onPdfFilesChange() {
            const input = document.getElementById('pdfFile')
            setPdfFiles(Array.from(input.files).filter(f => f.name.endsWith('.pdf')))
        }

        function setPdfFiles(files) {
            pdfFiles = files
            const area = document.getElementById('pdfFileArea')
            const list = document.getElementById('pdfList')
            if (!files.length) return
            area.classList.add('selected')
            area.innerHTML = `📁 PDF ${files.length}개 선택됨`
            list.style.display = 'block'
            list.innerHTML = files.map(f => {
                const p = f.webkitRelativePath || f.name
                return `<div>📄 ${p}</div>`
            }).join('')
        }

        function setupPdfDragDrop() {
            const area = document.getElementById('pdfFileArea')
            area.addEventListener('dragover', e => { e.preventDefault(); area.classList.add('dragover') })
            area.addEventListener('dragleave', () => area.classList.remove('dragover'))
            area.addEventListener('drop', e => {
                e.preventDefault()
                area.classList.remove('dragover')
                const items = e.dataTransfer.items
                if (!items) return
                const collected = []
                const readers = []
                for (const item of items) {
                    const entry = item.webkitGetAsEntry?.()
                    if (entry) readers.push(readEntry(entry, collected))
                }
                Promise.all(readers).then(() => setPdfFiles(collected.filter(f => f.name.endsWith('.pdf'))))
            })
        }

        function readEntry(entry, result) {
            if (entry.isFile) {
                return new Promise(resolve => entry.file(f => { result.push(f); resolve() }))
            }
            if (entry.isDirectory) {
                const reader = entry.createReader()
                return new Promise(resolve => {
                    const readAll = () => reader.readEntries(entries => {
                        if (!entries.length) return resolve()
                        Promise.all(entries.map(e => readEntry(e, result))).then(readAll)
                    })
                    readAll()
                })
            }
            return Promise.resolve()
        }

        async function uploadPdfs() {
            const msg = document.getElementById('msg')
            const btn = document.getElementById('pdfBtn')
            const list = document.getElementById('pdfList')

            if (!pdfFiles.length) { msg.className = 'msg err'; msg.textContent = 'PDF를 선택하세요.'; return }

            const { data: { session } } = await client.auth.getSession()
            if (!session) { window.location.href = '/login.html?redirect=/upload.html'; return }

            btn.disabled = true
            let done = 0, failed = 0

            for (const file of pdfFiles) {
                const path = file.webkitRelativePath || file.name
                msg.className = 'msg'
                msg.textContent = `업로드 중... ${done + failed + 1}/${pdfFiles.length}`

                const { error } = await client.storage
                    .from(pdfBucketName)
                    .upload(path, file, { contentType: 'application/pdf', upsert: true })

                if (error) {
                    failed++
                    const item = [...list.children].find(el => el.textContent.includes(path))
                    if (item) item.style.color = '#e00'
                } else {
                    done++
                    const item = [...list.children].find(el => el.textContent.includes(path))
                    if (item) item.style.color = '#090'
                }
            }

            msg.className = failed ? 'msg err' : 'msg ok'
            msg.textContent = `✓ ${done}개 완료${failed ? ` / ❌ ${failed}개 실패` : ''}`
            btn.disabled = false
            pdfFiles = []
        }

        async function upload() {
            const title = document.getElementById('title').value.trim()
            const lecture_date = document.getElementById('lecture_date').value
            const file = document.getElementById('file').files[0]
            const msg = document.getElementById('msg')
            const btn = document.getElementById('btn')

            if (!title) { msg.className = 'msg err'; msg.textContent = '제목을 입력하세요.'; return }
            if (!file)  { msg.className = 'msg err'; msg.textContent = '파일을 선택하세요.'; return }

            btn.disabled = true
            msg.className = 'msg'
            msg.textContent = '업로드 중...'

            const { data: { session } } = await client.auth.getSession()
            console.log('upload session:', session)
            if (!session) {
                window.location.href = '/login.html?redirect=/upload.html'
                return
            }
            const filename = `${Date.now()}_${sanitizeFileName(file.name)}`

            const { error: uploadError } = await client.storage
                .from(bucketName)
                .upload(filename, file, { contentType: 'text/html', upsert: false })

            if (uploadError) {
                console.error('Storage upload error', uploadError)
                msg.className = 'msg err'
                if (uploadError.message && uploadError.message.includes('Bucket not found')) {
                    msg.textContent = '업로드 실패: 저장소 버킷이 없습니다. Supabase Storage에 "' + bucketName + '" 버킷을 생성하거나 코드의 버킷 이름을 수정하세요.'
                } else {
                    msg.textContent = '업로드 실패: ' + (uploadError.message || JSON.stringify(uploadError))
                }
                btn.disabled = false
                return
            }

            const { data: { publicUrl } } = client.storage
                .from(bucketName)
                .getPublicUrl(filename)

            const { data: minData } = await client.from('posts').select('sort_order').not('sort_order', 'is', null).order('sort_order', { ascending: true }).limit(1)
            const minOrder = typeof minData?.[0]?.sort_order === 'number' ? minData[0].sort_order : 0
            const newOrder = minOrder - 1

            const { error: dbError } = await client.from('posts').insert({
                title,
                filename,
                url: publicUrl,
                user_id: session.user.id,
                lecture_date: lecture_date || null,
                sort_order: newOrder
            })

            if (dbError) {
                msg.className = 'msg err'
                msg.textContent = 'DB 저장 실패: ' + dbError.message
                btn.disabled = false
                return
            }

            msg.className = 'msg ok'
            msg.textContent = '✓ 업로드 완료! 목록으로 이동합니다.'
            document.getElementById('title').value = ''
            document.getElementById('file').value = ''
            document.getElementById('fileArea').textContent = '클릭하여 파일 선택 (.html)'
            document.getElementById('fileArea').classList.remove('selected')
            btn.disabled = false
            setTimeout(() => window.location.href = '/', 900)
        }

        async function logout() {
            await client.auth.signOut()
            window.location.href = '/login.html'
        }
    </script>
</body>
</html>
