<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏢</text></svg>">
    <title>업로드</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #ffffff;
            color: #333;
        }
        .container {
            width: 100%;
            max-width: 400px;
            padding: 2rem;
        }
        h1 {
            font-size: 1.3rem;
            font-weight: 600;
            margin: 0 0 1.5rem;
            text-align: center;
        }
        label {
            font-size: 0.78rem;
            color: #888;
            display: block;
            margin-bottom: 5px;
        }
        input[type="text"] {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 0.9rem;
            margin-bottom: 16px;
            outline: none;
            transition: border-color 0.2s;
        }
        input[type="text"]:focus { border-color: #000; }
        input[type="file"] { display: none; }
        .file-area {
            border: 1.5px dashed #ddd;
            border-radius: 6px;
            padding: 28px;
            text-align: center;
            margin-bottom: 16px;
            cursor: pointer;
            font-size: 0.85rem;
            color: #aaa;
            transition: all 0.2s;
        }
        .file-area:hover { border-color: #999; color: #666; }
        .file-area.selected { border-color: #000; color: #333; border-style: solid; }
        button {
            width: 100%;
            padding: 11px;
            background: #000;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover { background: #333; }
        button:disabled { background: #aaa; cursor: not-allowed; }
        .msg {
            font-size: 0.8rem;
            text-align: center;
            margin-top: 10px;
            min-height: 18px;
        }
        .err { color: #e00; }
        .ok { color: #090; }
        .back {
            display: block;
            text-align: center;
            margin-top: 16px;
            font-size: 0.8rem;
            color: #aaa;
            text-decoration: none;
        }
        .back:hover { color: #000; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📤 파일 업로드</h1>
        <label>제목</label>
        <input type="text" id="title" placeholder="특강 제목을 입력하세요" />
        <label>HTML 파일</label>
        <div class="file-area" id="fileArea" onclick="document.getElementById('file').click()">
            클릭하여 파일 선택 (.html)
        </div>
        <input type="file" id="file" accept=".html" onchange="onFileChange()" />
        <button id="btn" onclick="upload()">업로드</button>
        <div class="msg" id="msg"></div>
        <a href="/" class="back">← 목록으로</a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const client = supabase.createClient(
            'https://jsxzyhzltlurfbyvaoow.supabase.co',
            'sb_publishable_hUXcNvjScqIRigCfGwpfUQ_2rcLJMHy'
        )
        const bucketName = 'html-files'

        client.auth.onAuthStateChange((event, session) => {
            if (event === 'INITIAL_SESSION' && !session) location.href = '/login.html?redirect=/upload.html'
        })
        

        function onFileChange() {
            const file = document.getElementById('file').files[0]
            const area = document.getElementById('fileArea')
            if (file) {
                area.textContent = '📄 ' + file.name
                area.classList.add('selected')
            }
        }

        function sanitizeFileName(name) {
            // Supabase Storage key에는 공백, 한글, 특수문자가 들어가면 실패할 수 있습니다.
            const extMatch = name.match(/(\.[^.]*)$/)
            const ext = extMatch ? extMatch[1] : ''
            const base = extMatch ? name.slice(0, -ext.length) : name
            return base
                .replace(/\s+/g, '_')
                .replace(/[^a-zA-Z0-9-_\.]/g, '_')
                .replace(/_+/g, '_')
                .replace(/^_+|_+$/g, '') + ext
        }

        async function upload() {
            const title = document.getElementById('title').value.trim()
            const file = document.getElementById('file').files[0]
            const msg = document.getElementById('msg')
            const btn = document.getElementById('btn')

            if (!title) { msg.className = 'msg err'; msg.textContent = '제목을 입력하세요.'; return }
            if (!file)  { msg.className = 'msg err'; msg.textContent = '파일을 선택하세요.'; return }

            btn.disabled = true
            msg.className = 'msg'
            msg.textContent = '업로드 중...'

            const { data: { session } } = await client.auth.getSession()
            if (!session) {
                window.location.href = '/login.html?redirect=/upload.html'
                return
            }
            const filename = `${Date.now()}_${sanitizeFileName(file.name)}`

            const { error: uploadError } = await client.storage
                .from(bucketName)
                .upload(filename, file, { contentType: 'text/html' })

            if (uploadError) {
                msg.className = 'msg err'
                if (uploadError.message.includes('Bucket not found')) {
                    msg.textContent = '업로드 실패: 저장소 버킷이 없습니다. Supabase Storage에 "' + bucketName + '" 버킷을 생성하거나 코드의 버킷 이름을 수정하세요.'
                } else {
                    msg.textContent = '업로드 실패: ' + uploadError.message
                }
                btn.disabled = false
                return
            }

            const { data: { publicUrl } } = client.storage
                .from(bucketName)
                .getPublicUrl(filename)

            const { error: dbError } = await client.from('posts').insert({
                title,
                filename,
                url: publicUrl,
                user_id: session.user.id
            })

            if (dbError) {
                msg.className = 'msg err'
                msg.textContent = 'DB 저장 실패: ' + dbError.message
                btn.disabled = false
                return
            }

            msg.className = 'msg ok'
            msg.textContent = '✓ 업로드 완료! 목록에 바로 반영됩니다.'
            document.getElementById('title').value = ''
            document.getElementById('file').value = ''
            document.getElementById('fileArea').textContent = '클릭하여 파일 선택 (.html)'
            document.getElementById('fileArea').classList.remove('selected')
            btn.disabled = false
        }
    </script>
</body>
</html>
