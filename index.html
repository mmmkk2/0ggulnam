<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📝</text></svg>">
    <title>영끌남 컨설팅 노트</title>
    <meta property="og:title" content="영끌남 컨설팅 노트" />
    <meta property="og:description" content="영끌남 컨설팅 수강생 전용 복습 자료 모음" />
    <meta property="og:type" content="website" />
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            margin: 0;
            background-color: #ffffff;
            color: #333;
            padding: 3rem 1rem;
        }
        .container {
            width: 100%;
            max-width: 560px;
        }
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 2rem;
        }
        h1 {
            font-size: 1.5rem;
            font-weight: 600;
            letter-spacing: -0.5px;
            margin: 0;
        }
        .upload-btn {
            text-decoration: none;
            font-size: 0.8rem;
            color: #666;
            border: 1px solid #ddd;
            padding: 6px 12px;
            border-radius: 6px;
            transition: all 0.2s;
        }
        .upload-btn:hover { background: #000; color: #fff; border-color: #000; }
        nav {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        a.item {
            text-decoration: none;
            color: #000;
            border: 1px solid #ddd;
            padding: 12px 24px;
            border-radius: 6px;
            font-size: 0.9rem;
            transition: all 0.2s ease;
            box-sizing: border-box;
            display: flex;
            gap: 10px;
            align-items: center;
            text-align: left;
        }
        a.item:hover { background-color: #000; color: #fff; border-color: #000; }
        a.item:hover .date { color: #ccc; }
        .date {
            font-size: 0.75rem;
            color: #aaa;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .divider {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 20px 0 10px;
            color: #bbb;
            font-size: 0.75rem;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #eee;
        }
        #user-posts { display: flex; flex-direction: column; gap: 10px; }
        .user-item {
            text-decoration: none;
            color: #000;
            border: 1px solid #eee;
            padding: 12px 16px;
            border-radius: 6px;
            font-size: 0.9rem;
            transition: all 0.2s ease;
            box-sizing: border-box;
            display: flex;
            gap: 8px;
            align-items: center;
            justify-content: space-between;
        }
        .user-item:hover { background-color: #000; color: #fff; border-color: #000; }
        .user-item:hover .date { color: #ccc; }
        .user-item a.item-link {
            flex: 1;
            text-decoration: none;
            color: inherit;
            display: flex;
            gap: 8px;
            align-items: center;
        }
        button.delete-btn {
            border: 1px solid #ddd;
            background: #fff;
            color: #000;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
        }
        button.delete-btn:hover {
            background: #f8d7da;
            border-color: #e0a0a8;
            color: #a00;
        }
        button.edit-btn {
            border: 1px solid #ddd;
            background: #fff;
            color: #999;
            padding: 8px 10px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            flex-shrink: 0;
        }
        button.edit-btn:hover { background: #f5f5f5; color: #000; }
        .edit-form {
            flex: 1;
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .edit-form input[type="text"] {
            flex: 1;
            border: 1px solid #000;
            border-radius: 4px;
            padding: 4px 8px;
            font-size: 0.9rem;
            outline: none;
        }
        .edit-form input[type="date"] {
            border: 1px solid #ddd;
            border-radius: 4px;
            padding: 4px 6px;
            font-size: 0.8rem;
            outline: none;
        }
        .edit-mode-el { display: none !important; }
        .edit-active .drag-handle { display: inline-block !important; }
        .edit-active button.edit-btn,
        .edit-active button.delete-btn { display: inline-flex !important; }
        .drag-handle {
            color: #ccc;
            cursor: grab;
            font-size: 1rem;
            padding: 0 4px;
            flex-shrink: 0;
            user-select: none;
        }
        .drag-handle:active { cursor: grabbing; }
        .user-item { position: relative; }
        .user-item.dragging { opacity: 0.4; }
        .user-item.drag-above::before,
        .user-item.drag-below::after {
            content: '';
            position: absolute;
            left: -10px;
            right: -10px;
            height: 3px;
            background: #000;
            border-radius: 2px;
        }
        .user-item.drag-above::before { top: -6px; }
        .user-item.drag-below::after { bottom: -6px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📝 영끌남 컨설팅 노트</h1>
            <div style="display:flex;gap:8px;align-items:center;">
                <button id="save-order-btn" onclick="saveOrder()" style="display:none;font-size:0.8rem;padding:6px 12px;border:1px solid #000;background:#000;color:#fff;border-radius:6px;cursor:pointer;">저장</button>
                <button id="edit-toggle-btn" onclick="toggleEditMode()" style="display:none;font-size:0.8rem;padding:6px 12px;border:1px solid #ddd;background:#fff;color:#666;border-radius:6px;cursor:pointer;">수정</button>
                <a href="/upload.html" class="upload-btn" id="upload-btn" style="display:none;">+</a>
            </div>
        </div>
        <p style="font-size:0.72rem;color:#aaa;margin:0 0 12px;">목록이 나타나기까지 1-2초 정도 소요될 수 있습니다.</p>
        <nav id="posts-nav"></nav>
        <div id="bottom-bar" style="margin-top:2rem;text-align:center;"></div>
        <div style="margin-top:2.5rem;text-align:center;color:#aaa;font-size:0.72rem;line-height:1.8;">
            <div>© <a href="https://www.buildingschool.co.kr/" target="_blank" style="color:#aaa;text-decoration:none;">영끌남</a></div>
            <div>edited by <a href="mailto:mmkkshim@gmail.com" style="color:#aaa;text-decoration:none;">mk</a></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const client = supabase.createClient(
            'https://jsxzyhzltlurfbyvaoow.supabase.co',
            'sb_publishable_hUXcNvjScqIRigCfGwpfUQ_2rcLJMHy'
        )

        async function deletePost(postId, filename, element) {
            if (!confirm('정말 이 게시물을 삭제하시겠습니까?')) return
            if (filename) await client.storage.from('html-files').remove([filename])
            const { error } = await client.from('posts').delete().eq('id', postId)
            if (error) {
                alert('삭제 실패: ' + error.message)
                return
            }
            element.remove()
        }

        async function logout() {
            await client.auth.signOut()
            location.reload()
        }

        let editMode = false
        function toggleEditMode() {
            editMode = !editMode
            const nav = document.getElementById('posts-nav')
            const toggleBtn = document.getElementById('edit-toggle-btn')
            const saveBtn = document.getElementById('save-order-btn')

            if (editMode) {
                nav.classList.add('edit-active')
                toggleBtn.textContent = '취소'
                toggleBtn.style.borderColor = '#000'
                saveBtn.style.display = 'block'
                nav.querySelectorAll('.user-item[draggable]').forEach(el => el.draggable = true)
            } else {
                nav.classList.remove('edit-active')
                toggleBtn.textContent = '수정'
                toggleBtn.style.borderColor = '#ddd'
                saveBtn.style.display = 'none'
                nav.querySelectorAll('.user-item').forEach(el => el.draggable = false)
            }
        }

        async function saveOrder() {
            const btn = document.getElementById('save-order-btn')
            btn.textContent = '저장 중...'
            btn.disabled = true
            const container = document.getElementById('posts-nav')
            const items = [...container.querySelectorAll('.user-item')]
            const results = await Promise.all(items.map((item, idx) =>
                client.from('posts').update({ sort_order: idx }).eq('id', item.dataset.id)
            ))
            const failed = results.find(r => r.error)
            if (failed) {
                alert('저장 실패: ' + failed.error.message)
            } else {
                btn.textContent = '저장됨 ✓'
            }
            btn.disabled = false
        }

        async function init() {
            const { data: { session } } = await client.auth.getSession()
            const uploadBtn = document.getElementById('upload-btn')
            const bottomBar = document.getElementById('bottom-bar')

            if (session) {
                uploadBtn.style.display = 'block'
                document.getElementById('edit-toggle-btn').style.display = 'block'
                bottomBar.innerHTML = `<button onclick="logout()" style="background:none;border:none;color:#bbb;font-size:0.75rem;cursor:pointer;padding:4px 8px;">로그아웃</button>`
            } else {
                bottomBar.innerHTML = `<a href="/login.html" style="color:#bbb;font-size:0.75rem;text-decoration:none;">관리자</a>`
            }

            const { data: posts, error } = await client
                .from('posts')
                .select('*')
                .order('sort_order', { ascending: true })

            console.log('posts query', { posts, error, session })

            const container = document.getElementById('posts-nav')
            if (error) {
                const errEl = document.createElement('div')
                errEl.style.color = '#e00'
                errEl.textContent = '목록을 불러오는 중 오류가 발생했습니다: ' + error.message
                container.appendChild(errEl)
                return
            }

            if (!posts || posts.length === 0) {
                const emptyEl = document.createElement('div')
                emptyEl.style.color = '#666'
                emptyEl.style.padding = '16px 0'
                emptyEl.textContent = '현재 목록에 등록된 항목이 없습니다. 업로드 후 다시 확인하세요.'
                container.appendChild(emptyEl)
                return
            }

            let dragSrc = null

            function clearIndicators() {
                container.querySelectorAll('.user-item').forEach(i => {
                    i.classList.remove('drag-above', 'drag-below')
                })
            }

            function getInsertPosition(el, clientY) {
                const rect = el.getBoundingClientRect()
                return clientY < rect.top + rect.height / 2 ? 'above' : 'below'
            }

            container.addEventListener('dragover', e => e.preventDefault())
            container.addEventListener('drop', e => e.preventDefault())

            function addDragEvents(el) {
                el.addEventListener('dragstart', e => {
                    dragSrc = el
                    e.dataTransfer.effectAllowed = 'move'
                    setTimeout(() => el.classList.add('dragging'), 0)
                })
                el.addEventListener('dragend', () => {
                    dragSrc = null
                    el.classList.remove('dragging')
                    clearIndicators()
                })
                el.addEventListener('dragover', e => {
                    e.preventDefault()
                    if (!dragSrc || el === dragSrc) return
                    clearIndicators()
                    const pos = getInsertPosition(el, e.clientY)
                    el.classList.add(pos === 'above' ? 'drag-above' : 'drag-below')
                })
                el.addEventListener('dragleave', () => {
                    el.classList.remove('drag-above', 'drag-below')
                })
                el.addEventListener('drop', e => {
                    e.preventDefault()
                    e.stopPropagation()
                    if (!dragSrc || dragSrc === el) return
                    const pos = getInsertPosition(el, e.clientY)
                    clearIndicators()
                    if (pos === 'above') el.before(dragSrc)
                    else el.after(dragSrc)
                })
            }


            posts.forEach(post => {
                const dateStr = post.lecture_date || post.created_at
                const date = new Date(dateStr).toLocaleDateString('ko-KR', { month: '2-digit', day: '2-digit' })
                const itemWrapper = document.createElement('div')
                itemWrapper.className = 'user-item'
                itemWrapper.dataset.id = post.id

                if (session) {
                    const handle = document.createElement('span')
                    handle.className = 'drag-handle edit-mode-el'
                    handle.textContent = '⠿'
                    itemWrapper.draggable = false
                    itemWrapper.appendChild(handle)
                    addDragEvents(itemWrapper)
                }

                const link = document.createElement('a')
                link.className = 'item-link'
                link.href = post.id ? `/view.html?id=${post.id}` : '#'
                link.target = '_self'
                link.draggable = false
                link.innerHTML = `<span class="date">${date}</span><span>${post.title || '제목 없음'}</span>`
                itemWrapper.appendChild(link)

                if (session) {
                    const editBtn = document.createElement('button')
                    editBtn.className = 'edit-btn edit-mode-el'
                    editBtn.type = 'button'
                    editBtn.textContent = '✏️'
                    editBtn.onclick = () => {
                        const isEditing = itemWrapper.dataset.editing === 'true'
                        if (isEditing) {
                            const titleVal = itemWrapper.querySelector('.edit-title').value.trim()
                            const dateVal = itemWrapper.querySelector('.edit-date').value
                            client.from('posts').update({ title: titleVal, lecture_date: dateVal || null }).eq('id', post.id).then(({ error }) => {
                                if (error) { alert('수정 실패: ' + error.message); return }
                                post.title = titleVal
                                post.lecture_date = dateVal
                                const d = new Date(dateVal || post.created_at).toLocaleDateString('ko-KR', { month: '2-digit', day: '2-digit' })
                                link.innerHTML = `<span class="date">${d}</span><span>📄 ${titleVal || '제목 없음'}</span>`
                                link.style.display = ''
                                itemWrapper.querySelector('.edit-form').remove()
                                editBtn.textContent = '✏️'
                                itemWrapper.dataset.editing = 'false'
                            })
                        } else {
                            link.style.display = 'none'
                            const form = document.createElement('div')
                            form.className = 'edit-form'
                            const titleInput = document.createElement('input')
                            titleInput.type = 'text'
                            titleInput.className = 'edit-title'
                            titleInput.value = post.title || ''
                            const dateInput = document.createElement('input')
                            dateInput.type = 'date'
                            dateInput.className = 'edit-date'
                            dateInput.value = post.lecture_date || ''
                            form.appendChild(titleInput)
                            form.appendChild(dateInput)
                            link.after(form)
                            editBtn.textContent = '✓'
                            itemWrapper.dataset.editing = 'true'
                            titleInput.focus()
                        }
                    }
                    itemWrapper.appendChild(editBtn)

                    const htmlEditBtn = document.createElement('button')
                    htmlEditBtn.className = 'delete-btn edit-mode-el'
                    htmlEditBtn.type = 'button'
                    htmlEditBtn.textContent = 'HTML'
                    htmlEditBtn.onclick = () => location.href = `/edit.html?id=${post.id}`
                    itemWrapper.appendChild(htmlEditBtn)

                    const deleteBtn = document.createElement('button')
                    deleteBtn.className = 'delete-btn edit-mode-el'
                    deleteBtn.type = 'button'
                    deleteBtn.textContent = '삭제'
                    deleteBtn.onclick = () => deletePost(post.id, post.filename, itemWrapper)
                    itemWrapper.appendChild(deleteBtn)
                }

                container.appendChild(itemWrapper)
            })
        }

        init()
    </script>
</body>
</html>
