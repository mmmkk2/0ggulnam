<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏢</text></svg>">
    <title>Oggulnam Dashboard</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            margin: 0;
            background-color: #ffffff;
            color: #333;
            padding: 3rem 1rem;
        }
        .container {
            width: 100%;
            max-width: 560px;
        }
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 2rem;
        }
        h1 {
            font-size: 1.5rem;
            font-weight: 600;
            letter-spacing: -0.5px;
            margin: 0;
        }
        .upload-btn {
            text-decoration: none;
            font-size: 0.8rem;
            color: #666;
            border: 1px solid #ddd;
            padding: 6px 12px;
            border-radius: 6px;
            transition: all 0.2s;
        }
        .upload-btn:hover { background: #000; color: #fff; border-color: #000; }
        nav {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        a.item {
            text-decoration: none;
            color: #000;
            border: 1px solid #ddd;
            padding: 12px 24px;
            border-radius: 6px;
            font-size: 0.9rem;
            transition: all 0.2s ease;
            box-sizing: border-box;
            display: flex;
            gap: 10px;
            align-items: center;
            text-align: left;
        }
        a.item:hover { background-color: #000; color: #fff; border-color: #000; }
        a.item:hover .date { color: #ccc; }
        .date {
            font-size: 0.75rem;
            color: #aaa;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .divider {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 20px 0 10px;
            color: #bbb;
            font-size: 0.75rem;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #eee;
        }
        #user-posts { display: flex; flex-direction: column; gap: 10px; }
        .user-item {
            text-decoration: none;
            color: #000;
            border: 1px solid #eee;
            padding: 12px 24px;
            border-radius: 6px;
            font-size: 0.9rem;
            transition: all 0.2s ease;
            box-sizing: border-box;
            display: flex;
            gap: 10px;
            align-items: center;
            justify-content: space-between;
        }
        .user-item:hover { background-color: #000; color: #fff; border-color: #000; }
        .user-item:hover .date { color: #ccc; }
        .user-item a.item-link {
            flex: 1;
            text-decoration: none;
            color: inherit;
            display: flex;
            gap: 10px;
            align-items: center;
        }
        button.delete-btn {
            border: 1px solid #ddd;
            background: #fff;
            color: #000;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
        }
        button.delete-btn:hover {
            background: #f8d7da;
            border-color: #e0a0a8;
            color: #a00;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>영끌남 특강 복습</h1>
            <a href="/upload.html" class="upload-btn" id="upload-btn">+</a>
        </div>
        <nav id="posts-nav">
            <a href="/npl-0429" class="item">
                <span class="date">04/29</span>NPL컨설팅 복습하기
            </a>
            <a href="/sellresult-0429" class="item">
                <span class="date">04/29</span>영끌남 컨설팅 매각 완료 실적 포트폴리오
            </a>
            <a href="/suga-0426" class="item">
                <span class="date">04/26</span>영끌남x슈가 정책자금 특강 💰 — 5년 2,900억 집행한 슈가컴퍼니의 진짜 노하우
            </a>
            <a href="/loan-0425" class="item">
                <span class="date">04/25</span>영끌남 대출 특강 💰 - 0원에서 시작하는 대출 레버리지 완전 정복
            </a>
            <a href="/consulting-0422" class="item">
                <span class="date">04/22</span>영끌남 컨설팅 v1 🏢 — 안 산 건물에서 배우는 진짜 통찰
            </a>
            <a href="/npl-0327" class="item">
                <span class="date">03/27</span>영끌남 9기 NPL 특강 💰 - 곽지훈 대표 (아카이브 부동산)
            </a>
        </nav>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const client = supabase.createClient(
            'https://jsxzyhzltlurfbyvaoow.supabase.co',
            'sb_publishable_hUXcNvjScqIRigCfGwpfUQ_2rcLJMHy'
        )

        async function deletePost(postId, element) {
            if (!confirm('정말 이 게시물을 삭제하시겠습니까?')) return
            const { error } = await client.from('posts').delete().eq('id', postId)
            if (error) {
                alert('삭제 실패: ' + error.message)
                return
            }
            element.remove()
        }

        async function init() {
            const { data: { session } } = await client.auth.getSession()
            const btn = document.getElementById('upload-btn')
            btn.href = session ? '/upload.html' : '/login.html?redirect=/upload.html'

            const { data: posts } = await client
                .from('posts')
                .select('*')
                .order('created_at', { ascending: false })

            if (posts && posts.length > 0) {
                const container = document.getElementById('posts-nav')
                posts.forEach(post => {
                    const date = new Date(post.created_at).toLocaleDateString('ko-KR', { month: '2-digit', day: '2-digit' })
                    const itemWrapper = document.createElement('div')
                    itemWrapper.className = 'user-item'

                    const link = document.createElement('a')
                    link.className = 'item-link'
                    link.href = post.url
                    link.target = '_blank'
                    link.innerHTML = `<span>📄 ${post.title}</span><span class="date">${date}</span>`
                    itemWrapper.appendChild(link)

                    if (session && post.user_id === session.user.id) {
                        const deleteBtn = document.createElement('button')
                        deleteBtn.className = 'delete-btn'
                        deleteBtn.type = 'button'
                        deleteBtn.textContent = '삭제'
                        deleteBtn.onclick = () => deletePost(post.id, itemWrapper)
                        itemWrapper.appendChild(deleteBtn)
                    }

                    container.appendChild(itemWrapper)
                })
            }
        }

        init()
    </script>
</body>
</html>
