<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏢</text></svg>">
    <title>Oggulnam Dashboard</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            margin: 0;
            background-color: #ffffff;
            color: #333;
            padding: 3rem 1rem;
        }
        .container {
            width: 100%;
            max-width: 560px;
        }
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 2rem;
        }
        h1 {
            font-size: 1.5rem;
            font-weight: 600;
            letter-spacing: -0.5px;
            margin: 0;
        }
        .upload-btn {
            text-decoration: none;
            font-size: 0.8rem;
            color: #666;
            border: 1px solid #ddd;
            padding: 6px 12px;
            border-radius: 6px;
            transition: all 0.2s;
        }
        .upload-btn:hover { background: #000; color: #fff; border-color: #000; }
        nav {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        a.item {
            text-decoration: none;
            color: #000;
            border: 1px solid #ddd;
            padding: 12px 24px;
            border-radius: 6px;
            font-size: 0.9rem;
            transition: all 0.2s ease;
            box-sizing: border-box;
            display: flex;
            gap: 10px;
            align-items: center;
            text-align: left;
        }
        a.item:hover { background-color: #000; color: #fff; border-color: #000; }
        a.item:hover .date { color: #ccc; }
        .date {
            font-size: 0.75rem;
            color: #aaa;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .divider {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 20px 0 10px;
            color: #bbb;
            font-size: 0.75rem;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #eee;
        }
        #user-posts { display: flex; flex-direction: column; gap: 10px; }
        .user-item {
            text-decoration: none;
            color: #000;
            border: 1px solid #eee;
            padding: 12px 24px;
            border-radius: 6px;
            font-size: 0.9rem;
            transition: all 0.2s ease;
            box-sizing: border-box;
            display: flex;
            gap: 10px;
            align-items: center;
            justify-content: space-between;
        }
        .user-item:hover { background-color: #000; color: #fff; border-color: #000; }
        .user-item:hover .date { color: #ccc; }
        .user-item a.item-link {
            flex: 1;
            text-decoration: none;
            color: inherit;
            display: flex;
            gap: 10px;
            align-items: center;
        }
        button.delete-btn {
            border: 1px solid #ddd;
            background: #fff;
            color: #000;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
        }
        button.delete-btn:hover {
            background: #f8d7da;
            border-color: #e0a0a8;
            color: #a00;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>영끌남 특강 복습</h1>
            <a href="/upload.html" class="upload-btn" id="upload-btn">+</a>
        </div>
        <nav id="posts-nav"></nav>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const client = supabase.createClient(
            'https://jsxzyhzltlurfbyvaoow.supabase.co',
            'sb_publishable_hUXcNvjScqIRigCfGwpfUQ_2rcLJMHy'
        )

        async function deletePost(postId, filename, element) {
            if (!confirm('정말 이 게시물을 삭제하시겠습니까?')) return
            if (filename) await client.storage.from('html-files').remove([filename])
            const { error } = await client.from('posts').delete().eq('id', postId)
            if (error) {
                alert('삭제 실패: ' + error.message)
                return
            }
            element.remove()
        }

        async function init() {
            const { data: { session } } = await client.auth.getSession()
            const btn = document.getElementById('upload-btn')
            btn.href = session ? '/upload.html' : '/login.html?redirect=/upload.html'

            const { data: posts, error } = await client
                .from('posts')
                .select('*')
                .order('created_at', { ascending: false })

            console.log('posts query', { posts, error, session })

            const container = document.getElementById('posts-nav')
            if (error) {
                const errEl = document.createElement('div')
                errEl.style.color = '#e00'
                errEl.textContent = '목록을 불러오는 중 오류가 발생했습니다: ' + error.message
                container.appendChild(errEl)
                return
            }

            if (!posts || posts.length === 0) {
                const emptyEl = document.createElement('div')
                emptyEl.style.color = '#666'
                emptyEl.style.padding = '16px 0'
                emptyEl.textContent = '현재 목록에 등록된 항목이 없습니다. 업로드 후 다시 확인하세요.'
                container.appendChild(emptyEl)
                return
            }

            posts.forEach(post => {
                const date = new Date(post.created_at).toLocaleDateString('ko-KR', { month: '2-digit', day: '2-digit' })
                const itemWrapper = document.createElement('div')
                itemWrapper.className = 'user-item'

                const link = document.createElement('a')
                link.className = 'item-link'
                link.href = post.url || '#'
                link.target = '_blank'
                link.innerHTML = `<span>📄 ${post.title || '제목 없음'}</span><span class="date">${date}</span>`
                itemWrapper.appendChild(link)

                if (session && post.user_id === session.user.id) {
                    const deleteBtn = document.createElement('button')
                    deleteBtn.className = 'delete-btn'
                    deleteBtn.type = 'button'
                    deleteBtn.textContent = '삭제'
                    deleteBtn.onclick = () => deletePost(post.id, post.filename, itemWrapper)
                    itemWrapper.appendChild(deleteBtn)
                }

                container.appendChild(itemWrapper)
            })
        }

        init()
    </script>
</body>
</html>
