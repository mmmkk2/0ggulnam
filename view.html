<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>뷰어</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { display: flex; flex-direction: column; height: 100vh; background: #fff; }
        .topbar {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 16px;
            border-bottom: 1px solid #eee;
            flex-shrink: 0;
        }
        .float-btns {
            position: fixed;
            bottom: 24px;
            right: 24px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            z-index: 9999;
        }
        .float-btn {
            text-decoration: none;
            color: #666;
            font-size: 0.85rem;
            border: 1px solid #ddd;
            padding: 8px 16px;
            border-radius: 20px;
            background: #fff;
            box-shadow: 0 2px 8px rgba(0,0,0,0.12);
            cursor: pointer;
            text-align: center;
        }
        .float-btn:hover { background: #000; color: #fff; border-color: #000; }
        @media (max-width: 768px) {
            .float-btns { bottom: 16px; right: 12px; }
        }
        .title { font-size: 0.9rem; color: #333; font-family: -apple-system, sans-serif; }
        iframe { flex: 1; border: none; width: 100%; }
        .error {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #e00;
            font-family: -apple-system, sans-serif;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="topbar">
        <span class="title" id="page-title"></span>
    </div>
    <div class="float-btns">
        <a href="/" class="float-btn">← 목록</a>
        <button class="float-btn" onclick="document.getElementById('viewer').contentWindow.postMessage('scrollTop','*')">↑ 맨위로</button>
    </div>
    <iframe id="viewer" sandbox="allow-scripts allow-same-origin"></iframe>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const client = supabase.createClient(
            'https://jsxzyhzltlurfbyvaoow.supabase.co',
            'sb_publishable_hUXcNvjScqIRigCfGwpfUQ_2rcLJMHy'
        )

        const params = new URLSearchParams(location.search)
        const id = params.get('id')
        const directUrl = params.get('url')

        const scrollListener = `<script>window.addEventListener('message',function(e){if(e.data==='scrollTop'){window.scrollTo({top:0,behavior:'smooth'});document.documentElement.scrollTop=0;document.body.scrollTop=0;}})<\/script>`

        function loadHtml(html) {
            const injected = html
                .replace('</head>', '<style>@media (min-width: 768px) { body { padding-left: 1.5rem !important; padding-right: 1.5rem !important; } }</style></head>')
                .replace('</body>', scrollListener + '</body>')
            document.getElementById('viewer').srcdoc = injected
        }

        async function init() {
            if (directUrl) {
                fetch(directUrl)
                    .then(r => { if (!r.ok) throw new Error(r.status); return r.text() })
                    .then(loadHtml)
                    .catch(() => {
                        document.getElementById('viewer').outerHTML = '<div class="error">파일을 불러올 수 없습니다.</div>'
                    })
                return
            }

            if (!id) {
                document.getElementById('viewer').outerHTML = '<div class="error">ID가 없습니다.</div>'
                return
            }

            const { data: post, error } = await client.from('posts').select('title, url').eq('id', id).single()
            if (error || !post) {
                document.getElementById('viewer').outerHTML = '<div class="error">게시물을 찾을 수 없습니다.</div>'
                return
            }

            document.getElementById('page-title').textContent = post.title || ''
            document.title = post.title || '뷰어'

            fetch(post.url)
                .then(r => { if (!r.ok) throw new Error(r.status); return r.text() })
                .then(loadHtml)
                .catch(() => {
                    document.getElementById('viewer').outerHTML = '<div class="error">파일을 불러올 수 없습니다.</div>'
                })
        }

        init()
    </script>
</body>
</html>
